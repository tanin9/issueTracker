<!DOCTYPE html>
<html lang="en" data-them="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- tailwind cdn -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
            type="text/css" />
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- font link -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">

        <!-- fav icon -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Issues-Tracker | login</title>
        <style>
            
            *{
                 font-family: "Geist", sans-serif;
                
                }
            body{
                 background-color:#f8fafc;
                 /* background-color:#4A00FF; */
            }

            .regular-text-color{
                color: #64748B;
            }
            
            .blue{
                background-color: #4A00FF;
            }


        </style>
    </head>
    <body class="container mx-auto ">
        <main>

            <section class="navbar bg-base-100 shadow-sm sticky top-0 z-10 ">
                <div class="w-10 rounded-full mx-1.5">
                    <img src="images/github-logo.png" alt />
                </div>
                <div class="flex-1 px-1.5">
                    <p class="font-semibold text-2xl">GitHub Issues
                        Tracker</p>
                </div>
                <div class="flex gap-2 input input-bordered"> <i
                        class="fa-solid fa-magnifying-glass regular-text-color"></i>
                    <input type="text" placeholder="Search issues..." />
                </div>

                <div class="flex gap-2 ">
                    <button id="search-btn"
                        class="btn btn-primary blue  rounded-[5px] mx-3">Search</button>
                </div>
            </section>

            <section
                class=" rounded-[5px] px-4 ">

                <div
                    class="flex flex-row gap-4 rounded-[5px] px-8 mx-10 py-4 mt-4 bg-white shadow-xl">
                    <button onclick="toggole('all-filter-button')"
                        id="all-filter-button"
                        class="btn btn-primary text-amber-50 w-25">All</button>
                    <button onclick="toggole('open-button')"
                        id="open-button"
                        class="btn text-[#64748B] w-25">Open</button>
                    <button onclick="toggole('closed-button')"
                        id="closed-button"
                        class="btn text-[#64748B] w-25">Closed</button>
                </div>

                <div
                    class=" px-7  mx-10 py-4 mt-3 bg-white flex justify-between rounded-[5px] shadow-xl">
                    <div class="flex gap-3 items-center">
                        <div class="bg-[#ECE4FF] p-1 rounded-full"> <img
                                src="images/Aperture.png" alt></div>
                        <div><p class="text-2xl font-semibold">50 Issues</p>
                            <p class="regular-text-color">Track and manage your
                                project issues</p></div>
                    </div>
                    <div class="flex gap-5 items-center">
                        <div class="flex gap-1 items-center"><div
                                class="p-1.5 border-2 bg-green-400 rounded-full"></div><span>open</span></div>
                        <div class="flex gap-1 items-center"><div
                                class="p-1.5 border-2 bg-purple-600 rounded-full"></div><span>closed</span></div>
                    </div>

                </div>
            </section>

            <section>
                <div id="loading-spinner" class="mt-7 justify-center items-center hidden">
                <span class="loading loading-infinity loading-xl"></span>
                </div>
            </section>
            <section id="issue-cards-container"
                class="  shadow-xl/20  px-10 mx-15 py-4 mt-10 mb-20 bg-white rounded-[5px] grid  sm:grid-cols-2 md:grid-cols-3 gap-4">

            </section>
            <section class="  mx-30 py-4 mt-10"></section>

        </main>
        <script src="home.js">

        </script>

    </body>
</html>
